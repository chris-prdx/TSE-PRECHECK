modules:
  jira:issuePanel:
    - key: tse-precheck
      resource: main
      resolver:
        function: resolver
      render: native
      title: TSE Pre-check
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: src/frontend/index.jsx
    # - key: onCreate
    #   handler: index.onCreate
app:
  runtime:
    name: nodejs22.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/def4f801-effa-4044-be6a-ae75ae93f23b

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
